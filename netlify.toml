[build]
  publish = "."
  functions = "netlify/functions"

[dev]
  framework = "#static"
  command = "npx http-server . -p 8888 --cors"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
